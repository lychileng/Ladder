proxy-providers:
  CMY:
    type: http
    url: <subscription_url>
    interval: 86400
    benchmark-url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 5

proxy-groups:
  # Groups
  - name: 🎯 AI
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/openai.png
    proxies:
      - 🛰️ Taiwan
      - 🛰️ Singapore
      - 🛰️ Japan
  - name: 🎯 Social
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/x.png
    proxies:
      - 🛰️ Taiwan
      - 🛰️ Hong Kong
      - 🛰️ Singapore
      - 🛰️ Japan
      - 🛰️ South Korea
      - 🛰️ United States
      - 🛰️ Worldwide
  - name: 🎯 Stream
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/youtube.png
    proxies:
      - 🛰️ Taiwan
      - 🛰️ Hong Kong
      - 🛰️ Singapore
      - 🛰️ Japan
      - 🛰️ South Korea
      - 🛰️ United States
      - 🛰️ Worldwide
  - name: 🎯 Crypto
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/bitcoin.png
    proxies:
      - 🛰️ Singapore
      - 🛰️ Hong Kong
      - 🛰️ Taiwan
      - 🛰️ Japan
      - DIRECT
  - name: 🎯 Offshore
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/hsbc.png
    proxies:
      - DIRECT
      - 🛰️ Taiwan
      - 🛰️ Hong Kong
      - 🛰️ Singapore
  - name: 🎯 Apple
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/apple.png
    proxies:
      - DIRECT
      - 🛰️ Taiwan
      - 🛰️ Hong Kong
      - 🛰️ Singapore
      - 🛰️ Japan
      - 🛰️ South Korea
      - 🛰️ United States
  - name: 🎯 Final
    type: select
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Service/global.png
    proxies:
      - 🛰️ Taiwan
      - 🛰️ Hong Kong
      - 🛰️ Singapore
      - 🛰️ Japan
      - 🛰️ South Korea
      - 🛰️ United States
      - 🛰️ Worldwide
      - DIRECT
  # Proxies
  - name: 🛰️ Taiwan
    type: url-test
    filter: "台|🇼🇸|🇹🇼|TW|(?i)Taiwan"
    interval: 600
    lazy: false
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/TW.png
    use:
      - CMY
  - name: 🛰️ Hong Kong
    type: url-test
    filter: "港|🇭🇰|HK|(?i)Hong"
    interval: 600
    lazy: false
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/HK.png
    use:
      - CMY
  - name: 🛰️ Singapore
    type: url-test
    filter: "新加坡|坡|🇸🇬|SG|(?i)Singapore"
    interval: 600
    lazy: false
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/SG.png
    use:
      - CMY
  - name: 🛰️ Japan
    type: url-test
    filter: "日|🇯🇵|JP|(?i)Japan"
    interval: 600
    lazy: false
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/JP.png
    use:
      - CMY
  - name: 🛰️ South Korea
    type: url-test
    filter: "韩|🇰🇷|KR|(?i)Korea"
    interval: 3600
    lazy: true
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/KR.png
    use:
      - CMY
  - name: 🛰️ United States
    type: url-test
    filter: "美|🇺🇸|US|(?i)States|America"
    interval: 3600
    lazy: true
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/US.png
    use:
      - CMY
  - name: 🛰️ Worldwide
    type: url-test
    filter: "^(?!.*(AI-Prime|美|US|USA|Japan|日|JP|Taiwan|台|TW|Singapore|新|SG|Korea|韩|韓|KR|(?i)Hong|港|HK)).*"
    interval: 3600
    lazy: true
    tolerance: 50
    url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 3
    icon: https://raw.githubusercontent.com/lychileng/Ladder/refs/heads/main/ICON/Flag/WW.png
    use:
      - CMY

