# GlobalMedia domain rules for Stash / Clash Premium
# behavior: domain
#
# Conversion notes:
# - DOMAIN is kept as exact domain: example.com
# - DOMAIN-SUFFIX is converted to Clash Premium suffix form: .example.com
# - DOMAIN-WILDCARD is kept only when it is an actual wildcard domain.
# - DOMAIN-KEYWORD is discarded; it has no lossless equivalent in behavior: domain.
# - IP-CIDR / IP-CIDR6 / IP-ASN / PROCESS-NAME / USER-AGENT are discarded.
# - Section comments are grouped by service category for maintenance only.
payload:
  # Video streaming
  - '.netflix.com'
  - '.nflxvideo.net'
  - '.nflximg.net'
  - '.nflxso.net'
  - '.youtube.com'
  - '.disneyplus.com'
  - '.disney-plus.net'
  - '.hbo.com'
  - '.hbomax.com'
  - '.primevideo.com'
  # Media CDN / supporting services
  - '.googlevideo.com'
  - '.aiv-cdn.net'
  - '.applevideo.net'
  - '.scdn.co'
  - '.phncdn.com'
  - '.phprcdn.com'
  - '.ofcdn.co'
  # Other global media domains
  - '.ytimg.com'
  - '.bamgrid.com'
  - '.tv.apple.com'
  - '.pornhub.com'
  - '.onlyfans.com'
  - '.onlyfansfans.com'
  - '.apnews.com'
  - '.theverge.com'
  - '.techcrunch.com'
  - '.wired.com'
  - '.economist.com'
  - '.foreignaffairs.com'
  - '.rthk.hk'
