# Advertising domain rules for Stash / Clash Premium
# behavior: domain
#
# Conversion notes:
# - DOMAIN is kept as exact domain: example.com
# - DOMAIN-SUFFIX is converted to Clash Premium suffix form: .example.com
# - DOMAIN-WILDCARD is kept only when it is an actual wildcard domain.
# - DOMAIN-KEYWORD is discarded; it has no lossless equivalent in behavior: domain.
# - IP-CIDR / IP-CIDR6 / IP-ASN / PROCESS-NAME / USER-AGENT are discarded.
# - Section comments are grouped by service category for maintenance only.
payload:
  # Google / major ad networks
  - '.doubleclick.net'
  - '.pagead2.googlesyndication.com'
  - '.googlesyndication.com'
  - '.googleadservices.com'
  - '.adnxs.com'
  - '.criteo.com'
  - '.taboola.com'
  - '.outbrain.com'
  # Other ad-related domains
  - '.adtrafficquality.google'
  - '.adjust.com'
  - '.ads-twitter.com'
  - '.ads.linkedin.com'
  # Analytics / tracking / attribution
  - '.appsflyer.com'
  - '.branch.io'
  - '.kochava.com'
  - '.umeng.com'
  # Mobile ad SDKs
  - '.unityads.unity3d.com'
  - '.chartboost.com'
  - '.applovin.com'
  - '.vungle.com'
  - '.admob.com'
  # Chinese ad / tracking services
  - '.umtrack.com'
  - '.baidustatic.com'
  - '.baiduad.com'
  - '.baidubce.com'
