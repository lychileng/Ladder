# AdvertisingLite safe domain rules for Stash
# behavior: domain
#
# Safe conversion notes:
# - DOMAIN is kept as exact domain.
# - DOMAIN-SUFFIX is converted to +.example.com.
# - DOMAIN-KEYWORD is discarded. There is no lossless domain-provider equivalent.
# - Single-label / TLD-wide suffixes such as top, xyz, icu, click are discarded to avoid overbroad matches.
# - IP-CIDR / IP-CIDR6 / IP-ASN / PROCESS-NAME / USER-AGENT are discarded.
# - Section comments are grouped by service category for maintenance only.
payload:
  # Google / major ad networks
  - '+.doubleclick.net'
  - '+.pagead2.googlesyndication.com'
  - '+.googlesyndication.com'
  - '+.googleadservices.com'
  - '+.adnxs.com'
  - '+.criteo.com'
  - '+.taboola.com'
  - '+.outbrain.com'
  # Other ad-related domains
  - '+.adtrafficquality.google'
  - '+.adjust.com'
  - '+.ads-twitter.com'
  - '+.ads.linkedin.com'
  # Analytics / tracking / attribution
  - '+.appsflyer.com'
  - '+.branch.io'
  - '+.kochava.com'
  - '+.umeng.com'
  # Mobile ad SDKs
  - '+.unityads.unity3d.com'
  - '+.chartboost.com'
  - '+.applovin.com'
  - '+.vungle.com'
  - '+.admob.com'
  # Chinese ad / tracking services
  - '+.umtrack.com'
  - '+.baidustatic.com'
  - '+.baiduad.com'
  - '+.baidubce.com'
