# Nike domain rules for Stash / Clash Premium
# behavior: domain
#
# Conversion notes:
# - DOMAIN is kept as exact domain: example.com
# - DOMAIN-SUFFIX is converted to Clash Premium suffix form: .example.com
# - DOMAIN-WILDCARD is kept only when it is an actual wildcard domain.
# - DOMAIN-KEYWORD is discarded; it has no lossless equivalent in behavior: domain.
# - IP-CIDR / IP-CIDR6 / IP-ASN / PROCESS-NAME / USER-AGENT are discarded.
# - Section comments are grouped by service category for maintenance only.
payload:
  # Nike official services
  - '.nike.com'
  - '.nikecdn.com'
  - '.nikecloud.com'
  - '.nikeinc.com.cn'
  - '.nikestore.com.au'
  - '.niketracking.com'
  - '.static-nike.com'
  - '.swoosh.com'
  # Other Nike-related domains
  - '.swoo.sh'
