# Microsoft safe domain rules for Stash
# behavior: domain
#
# Safe conversion notes:
# - DOMAIN is kept as exact domain.
# - DOMAIN-SUFFIX is converted to +.example.com.
# - DOMAIN-KEYWORD is discarded. There is no lossless domain-provider equivalent.
# - Single-label / TLD-wide suffixes such as top, xyz, icu, click are discarded to avoid overbroad matches.
# - IP-CIDR / IP-CIDR6 / IP-ASN / PROCESS-NAME / USER-AGENT are discarded.
# - Section comments are grouped by service category for maintenance only.
